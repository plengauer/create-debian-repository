name: CI

on:
  push:
    branches: main
    paths:
      - 'VERSION'

jobs:

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@2169fb0fa9a8260fde99a2a185bbf99a5d63546e # v5.59.0
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
        id: version
      - uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@edc52fb91829fdeee2e8a04b745d8f4fee33157d
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - run: mkdir -p ${{ runner.temp }}/utilities-repository
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./
        with:
          source: plengauer/Utilities
          directory: ${{ runner.temp }}/utilities-repository
      - shell: bash
        run: |
          set -euo pipefail
          repository_directory="${RUNNER_TEMP}/utilities-repository"
          port=18080
          python3 -m http.server "${port}" --directory "${repository_directory}" > "${RUNNER_TEMP}/http-server.log" 2>&1 &
          server_pid="$!"
          trap 'kill "${server_pid}"' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://localhost:${port}/dists/stable/Release" > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://localhost:${port}/dists/stable/Release" > /dev/null
          echo "deb [trusted=yes] http://localhost:${port} stable main" | sudo tee /etc/apt/sources.list.d/create-package-repository-test.list > /dev/null
          sudo apt-get update
          mapfile -t package_index_files < <(find /var/lib/apt/lists -maxdepth 1 -type f -name "localhost:${port}_dists_stable_main_binary-*_Packages")
          if [ "${#package_index_files[@]}" -eq 0 ]; then
            echo "No package index files were created by apt." >&2
            exit 1
          fi
          packages="$(awk '/^Package: / { print $2 }' "${package_index_files[@]}" | sort -u)"
          if [ -z "${packages}" ]; then
            echo "No packages listed by apt from the local repository." >&2
            exit 1
          fi
          printf 'Packages provided by local repository:\n%s\n' "${packages}"
